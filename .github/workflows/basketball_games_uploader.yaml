name: Upload Basketball Games To MaccabiPedia
on:
  schedule:
    - cron: '0 10,15,21 * * *'  # 1pm, 6pm, midnight IDT (UTC+3)
  workflow_dispatch:
  repository_dispatch:
    types: [zapier_trigger_basketball_upload_game]

jobs:
  upload-basketball-games:
    runs-on: ubuntu-latest
    # Force `bash -eo pipefail` for every run-step. Without pipefail, the
    # `... 2>&1 | tee -a /tmp/uploader.log` pipelines below would take their exit
    # code from `tee` (always 0), masking a crash in the crawler/uploader — a
    # failed upload would then leave the run green and the `if: failure()` alert
    # chain would never fire, silently dropping the game.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.11
          architecture: x64
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync

      - name: Crawl basket.co.il (latest 1 game)
        id: crawl_basket
        run: |
          uv run python -m maccabipediabot.basketball.crawl_basket_co_il \
            --season latest --limit 1 --output /tmp/basket.json \
            --unknown-teams-report /tmp/unknown_teams_basket.json 2>&1 | tee -a /tmp/uploader.log

      - name: Upload basket.co.il games
        id: upload_basket
        env:
          PYWIKIBOT_DIR: packages/maccabipediabot/src/maccabipediabot/pywikibot_configs/
          MACCABIPEDIA_BOT_USERNAME: ${{ secrets.MACCABIPEDIA_BOT_USERNAME }}
          MACCABIPEDIA_BOT_PASSWORD: ${{ secrets.MACCABIPEDIA_BOT_PASSWORD }}
        run: |
          uv run python -m maccabipediabot.basketball.gamesbot_basketball \
            --input /tmp/basket.json --skip-existing 2>&1 | tee -a /tmp/uploader.log

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Crawl Euroleague (via residential proxy)
        id: crawl_euroleague
        env:
          HTTPS_PROXY: ${{ secrets.EUROLEAGUE_HTTPS_PROXY }}
        run: |
          uv run python -m maccabipediabot.basketball.crawl_euroleague \
            --season latest --limit 1 --output /tmp/euroleague.json \
            --unknown-teams-report /tmp/unknown_teams_euroleague.json \
            --soft-fail-on-block 2>&1 | tee -a /tmp/uploader.log

      - name: Upload Euroleague games
        id: upload_euroleague
        env:
          PYWIKIBOT_DIR: packages/maccabipediabot/src/maccabipediabot/pywikibot_configs/
          MACCABIPEDIA_BOT_USERNAME: ${{ secrets.MACCABIPEDIA_BOT_USERNAME }}
          MACCABIPEDIA_BOT_PASSWORD: ${{ secrets.MACCABIPEDIA_BOT_PASSWORD }}
        run: |
          uv run python -m maccabipediabot.basketball.gamesbot_basketball \
            --input /tmp/euroleague.json --skip-existing 2>&1 | tee -a /tmp/uploader.log

      # Each crawl writes its own report file (and exits non-zero) when it hits a team
      # name missing from translations._TEAM_NAMES, which would otherwise leak the
      # English name into the game page title. Collect whichever reports exist — no
      # shared path, no ordering assumption — and notify the error channel so we add the
      # mapping and re-run. CI-only by construction: locally the crawl just raises.
      - name: Detect unknown basketball team name
        if: failure()
        id: unknown_team
        run: |
          reports=""
          for report in /tmp/unknown_teams_basket.json /tmp/unknown_teams_euroleague.json; do
            [ -f "$report" ] && reports="$reports $report"
          done
          if [ -n "$reports" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo "detail<<TG_EOF"
              cat $reports
              echo "TG_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # Not a team-mapping failure: report WHICH step died and the real error tail, so the
      # alert points at the actual cause (e.g. a wiki-login TimeoutError) instead of guessing.
      # Each python step tees its combined output to /tmp/uploader.log. Before sending we
      # redact secret VALUES (proxy URL, bot password) literally plus any scheme://user:pass@
      # credentials, HTML-escape, and cap total size — GitHub masks the run log but NOT the
      # action input we hand to Telegram.
      - name: Collect failure detail
        if: failure() && steps.unknown_team.outputs.found != 'true'
        id: failure_detail
        env:
          PROXY: ${{ secrets.EUROLEAGUE_HTTPS_PROXY }}
          BOT_PASSWORD: ${{ secrets.MACCABIPEDIA_BOT_PASSWORD }}
        run: |
          if   [ "${{ steps.crawl_basket.outcome }}" = "failure" ]; then failed_step="Crawl basket.co.il"
          elif [ "${{ steps.upload_basket.outcome }}" = "failure" ]; then failed_step="Upload basket.co.il games"
          elif [ "${{ steps.crawl_euroleague.outcome }}" = "failure" ]; then failed_step="Crawl Euroleague"
          elif [ "${{ steps.upload_euroleague.outcome }}" = "failure" ]; then failed_step="Upload Euroleague games"
          else failed_step="setup / a non-crawl step"
          fi
          echo "step=$failed_step" >> "$GITHUB_OUTPUT"

          detail="$(tail -n 25 /tmp/uploader.log 2>/dev/null || true)"
          [ -n "$detail" ] || detail="(no output captured)"
          # Literal (non-regex) secret redaction via bash substitution: a quoted pattern is
          # matched verbatim, so embedded / . * etc. need no escaping.
          if [ -n "$PROXY" ]; then detail="${detail//"$PROXY"/[redacted]}"; fi
          if [ -n "$BOT_PASSWORD" ]; then detail="${detail//"$BOT_PASSWORD"/[redacted]}"; fi
          detail="$(printf '%s' "$detail" \
            | sed -E 's#(https?://)[^/@[:space:]]+@#\1[redacted]@#g' \
            | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' \
            | tail -c 3000 || true)"
          {
            echo "detail<<TG_EOF_b9f3a2c1"
            printf '%s\n' "$detail"
            echo "TG_EOF_b9f3a2c1"
          } >> "$GITHUB_OUTPUT"

      - name: Alert error channel about unknown team name
        if: failure() && steps.unknown_team.outputs.found == 'true'
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.MACCABIPEDIA_ERRORS_TELEGRAM_TO }}
          token: ${{ secrets.MACCABIPEDIA_ERRORS_TELEGRAM_TOKEN }}
          message: |
            🏀 Basketball upload failed: the crawl returned an unmapped team name.
            Add the EN→HE mapping to translations._TEAM_NAMES, then re-run.
            ${{ steps.unknown_team.outputs.detail }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Any other failure — ping the error channel with the real failed step and error tail
      # (from Collect failure detail) so we act on the actual cause instead of a guess. Gated
      # on found != 'true' so it doesn't double-fire with the unmapped-team alert above.
      - name: Alert error channel on workflow failure
        if: failure() && steps.unknown_team.outputs.found != 'true'
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.MACCABIPEDIA_ERRORS_TELEGRAM_TO }}
          token: ${{ secrets.MACCABIPEDIA_ERRORS_TELEGRAM_TOKEN }}
          format: html
          message: |
            🏀 Basketball uploader failed (not a team-mapping issue).
            Failed step: ${{ steps.failure_detail.outputs.step }}
            Error tail:
            <pre>${{ steps.failure_detail.outputs.detail }}</pre>
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
