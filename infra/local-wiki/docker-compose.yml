services:
  mediawiki:
    build: .
    ports:
      - "8080:80"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    environment:
      MW_DB_HOST: mariadb
      MW_DB_NAME: maccabipedia
      MW_DB_USER: mw
      MW_DB_PASSWORD: devpass
      MW_DB_PREFIX: "MPMW_"
      MW_ADMIN_USER: maccabi
      # Must NOT be a substring of the username — MediaWiki's password policy
      # rejects that, so install.php silently fails to set it and login breaks.
      MW_ADMIN_PASSWORD: maccabi2026
      MW_SITE_NAME: "MaccabiPedia Dev"
      MW_SITE_SERVER: "http://localhost:8080"
      MW_SITE_LANG: "he"
    volumes:
      - mw_config:/generated
      - mw_images:/var/www/html/images
      # Skin sources come from the repo. The Maccabipedia skin's binary assets
      # are vendored under skins/Maccabipedia/assets/ (PR #142) and ride in via
      # this mount. Extensions are baked into the image (see Dockerfile +
      # extensions.json) — nothing is fetched from prod, so a fresh worktree
      # boots with `docker compose up -d --build` and no prod fetch.
      - ../../skins/Maccabipedia:/var/www/html/skins/Maccabipedia:ro
      - ../../skins/Metrolook:/var/www/html/skins/Metrolook:ro
      - ./config:/mw-config:ro
      - ./config/htaccess:/var/www/html/.htaccess:ro
      - ./config/favicon.ico:/var/www/html/favicon.ico:ro
      - ./config/apache-allow-override.conf:/etc/apache2/conf-enabled/zz-mw-allow-override.conf:ro

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: maccabipedia
      MYSQL_USER: mw
      MYSQL_PASSWORD: devpass
      MYSQL_ROOT_PASSWORD: devroot
    volumes:
      - mw_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mw_config:
  mw_images:
  mw_db:
